<div class="page">
  <header class="header">
    <div class="dragon-icon">🐉</div>
    <h1 class="gradient-text">Dragons of Mugloar</h1>
    <p class="subtitle">Choose your adventure</p>
  </header>

  <div class="modes">
    <button class="mode-card" (click)="navigateToManualPlay()">
      <span class="mode-icon">⚔️</span>
      <span class="mode-title">Play Manually</span>
      <span class="mode-desc">Pick your quests and shop items yourself</span>
    </button>

    <button class="mode-card" (click)="navigateToAiPlay()">
      <span class="mode-icon">🤖</span>
      <span class="mode-title">AI Play</span>
      <span class="mode-desc">Let the AI play and reach a target score</span>
    </button>
  </div>
</div>
